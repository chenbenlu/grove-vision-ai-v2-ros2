services:
  vision-ai:
    platform: linux/arm64
    devices:
      # Default Pi transport: Grove Vision AI V2 via USB-C.
      - /dev/ttyACM0:/dev/ttyACM0
    group_add:
      # `dialout` is the GID owning /dev/ttyACM*. Set DIALOUT_GID before `up`:
      #   export DIALOUT_GID=$(getent group dialout | cut -d: -f3)
      - "${DIALOUT_GID:-20}"
