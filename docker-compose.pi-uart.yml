services:
  vision-ai:
    platform: linux/arm64
    devices:
      # Grove Vision AI V2 USB-C → Pi USB-A  (transport == "serial", default).
      # - /dev/ttyACM0:/dev/ttyACM0
      # Grove V2 dedicated TX/RX → Pi GPIO 14/15  (transport == "serial" with
      # serial_port=/dev/ttyAMA0). Requires `dtoverlay=disable-bt` so the
      # PL011 sits on the GPIO header instead of Bluetooth.
      - /dev/ttyAMA0:/dev/ttyAMA0
    group_add:
      # Set the GID before `up`:
      #   export DIALOUT_GID=$(getent group dialout | cut -d: -f3)
      - "${DIALOUT_GID:-20}"
