services:
  vision-ai:
    platform: linux/arm64
    devices:
      # Grove Vision AI V2 USB-C → Pi USB-A → CDC virtual serial.
      # Hot-plug after `docker compose up` works: container will pick the
      # device up on next reader probe (after a few `serial unavailable` warns).
      - /dev/ttyACM0:/dev/ttyACM0
    group_add:
      # Set DIALOUT_GID to host's dialout group GID before `up`:
      #   export DIALOUT_GID=$(getent group dialout | cut -d: -f3)
      - "${DIALOUT_GID:-20}"
