services:
  vision-ai:
    platform: linux/arm64
    devices:
      # Grove Vision AI V2 dedicated TX/RX → Pi GPIO 14/15  (PL011).
      # Use with transport == "serial", serial_port == "/dev/ttyAMA0".
      # Requires `dtoverlay=disable-bt` in /boot/firmware/config.txt and
      # removal of `console=serial0,115200` from /boot/firmware/cmdline.txt
      # so the kernel console releases the UART.
      - /dev/ttyAMA0:/dev/ttyAMA0
    group_add:
      # Set the GID before `up`:
      #   export DIALOUT_GID=$(getent group dialout | cut -d: -f3)
      - "${DIALOUT_GID:-20}"
