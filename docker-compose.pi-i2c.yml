services:
  vision-ai:
    platform: linux/arm64
    devices:
      # I2C transport: Grove 4-pin cable to Pi GPIO header
      # (SDA = GPIO2 pin 3, SCL = GPIO3 pin 5).
      - /dev/i2c-1:/dev/i2c-1
    group_add:
      # Set I2C_GID before `up`:
      #   export I2C_GID=$(getent group i2c | cut -d: -f3)
      - "${I2C_GID:-998}"
    environment:
      # Force the I2C reader path; assumes the Grove V2 firmware ships
      # with SSCMA-Micro FEATURE_TRANSPORT support on I2C.
      ROS_DOMAIN_ID: ${ROS_DOMAIN_ID:-0}
    command:
      - ros2
      - run
      - vision_perception
      - vision_ai_node
      - --ros-args
      - -p
      - transport:=i2c
